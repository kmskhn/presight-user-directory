services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/users.db
      - PORT=3001
      - NODE_ENV=production
      - CLIENT_ORIGIN=http://localhost:5173
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  db-data:
    driver: local
